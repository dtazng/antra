[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    \.eggs
  | \.git
  | \.venv
  | __pycache__
  | cdk.out
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by black)
]
exclude = [
    ".venv",
    "cdk.out",
    "__pycache__",
]

[tool.ruff.per-file-ignores]
"tests/*" = ["B", "F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
