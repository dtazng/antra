name: antra
description: A calm, private, and intentional digital bullet journal with personal CRM.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local database — reactive SQLite ORM
  drift: ^2.18.0
  sqlcipher_flutter_libs: ^0.7.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # State management
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Secure token + key storage
  flutter_secure_storage: ^9.2.0

  # HTTP — API Gateway calls
  http: ^1.2.0

  # Background sync scheduling
  workmanager: ^0.5.0

  # Local notifications — check-in reminders
  flutter_local_notifications: ^17.0.0

  # UUID generation
  uuid: ^4.4.0

  # Date formatting
  intl: ^0.19.0

  # AES-256-GCM encryption for optional E2E (Pro tier)
  pointycastle: ^3.9.1

  # Voice logging — audio recording (mic → m4a/AAC file)
  record: ^6.1.1

  # Voice logging — on-device speech-to-text (iOS: AVSpeechRecognizer, Android: Google ASR)
  speech_to_text: ^7.3.0

  # Voice logging — local audio file playback with reactive streams
  just_audio: ^0.10.5

  # Timeline UX — swipe gestures on log cards (Flutter Favorite)
  flutter_slidable: ^4.0.3

  # Runtime permissions — microphone access request
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # drift code generation
  drift_dev: ^2.18.0
  build_runner: ^2.4.0

  # Riverpod code generation
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.0

flutter:
  uses-material-design: true
